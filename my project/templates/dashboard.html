<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>控制台 - 智能招标信息采集系统</title>
<link rel="stylesheet" href="/static/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-sm">智</div>
            <div class="logo-text">智招云</div>
        </div>
        <nav class="nav-menu">
            <a href="/dashboard" class="nav-item active"><span class="nav-icon">●</span>控制台</a>
            <a href="/list" class="nav-item"><span class="nav-icon">≡</span>招标列表</a>
            <a href="/analysis" class="nav-item"><span class="nav-icon">◈</span>趋势分析</a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-btn">退出登录</a>
        </div>
    </aside>
    <main class="main-content">
        <header class="top-bar">
            <div class="page-title">控制台 - 定制信息采集</div>
            <div class="user-info">欢迎，{{ session.user.username }}</div>
        </header>

        <div class="dashboard-grid">
            <div class="card stat-cards">
                <div class="stat-card">
                    <div class="stat-label">总数据量</div>
                    <div class="stat-value" id="statTotal">-</div>
                    <div class="stat-trend">TiDB 存储</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">去重URL数</div>
                    <div class="stat-value" id="statUrls">-</div>
                    <div class="stat-trend">Redis 集合</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">覆盖地区</div>
                    <div class="stat-value" id="statRegions">-</div>
                    <div class="stat-trend">全国主要城市</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">行业分类</div>
                    <div class="stat-value" id="statIndustries">-</div>
                    <div class="stat-trend">7大行业</div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>自定义关键词采集</h3>
                    <span class="card-desc">支持中英文关键词 / URL爬取</span>
                </div>
                <div class="card-body">
                    <div class="crawl-form">
                        <div class="input-group">
                            <label>关键词</label>
                            <input type="text" id="crawlKeyword" placeholder="例如：软件开发、医疗设备、building materials">
                        </div>
                        <div class="input-group">
                            <label>目标URL (可选)</label>
                            <input type="text" id="crawlUrl" placeholder="http://example.com/bidding">
                        </div>
                        <div class="input-group row-group">
                            <label>地区</label>
                            <select id="crawlRegion">
                                {% for r in regions %}
                                <option value="{{ r.id }}">{{ r.name }}</option>
                                {% endfor %}
                            </select>
                            <label>行业</label>
                            <select id="crawlIndustry">
                                <option value="">全部行业</option>
                                {% for i in industries %}
                                <option value="{{ i.id }}">{{ i.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <button class="btn-primary" onclick="startCrawl()">开始采集</button>
                        <div class="crawl-result" id="crawlResult"></div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>最近采集任务</h3>
                    <span class="card-desc">查看最近的爬取记录</span>
                </div>
                <div class="card-body">
                    <div class="task-list" id="taskList">
                        <div class="task-empty">正在加载...</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3>测试工具 - 异常场景验证</h3>
                    <span class="card-desc">用于验证解析规则和去重逻辑</span>
                </div>
                <div class="card-body">
                    <div class="test-tools">
                        <button class="btn-secondary" onclick="testDedupe()">URL去重测试</button>
                        <button class="btn-secondary" onclick="testParse()">HTML解析测试</button>
                        <div class="test-result" id="testResult"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script src="/static/js/dashboard.js"></script>
</body>
</html>
