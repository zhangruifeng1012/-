<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招标列表 - 智能招标信息采集系统</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="app-layout">
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-sm">智</div>
            <div class="logo-text">智招云</div>
        </div>
        <nav class="nav-menu">
            <a href="/dashboard" class="nav-item"><span class="nav-icon">●</span>控制台</a>
            <a href="/list" class="nav-item active"><span class="nav-icon">≡</span>招标列表</a>
            <a href="/analysis" class="nav-item"><span class="nav-icon">◈</span>趋势分析</a>
        </nav>
        <div class="sidebar-footer">
            <a href="/logout" class="logout-btn">退出登录</a>
        </div>
    </aside>
    <main class="main-content">
        <header class="top-bar">
            <div class="page-title">招标列表 - 按时间和地区筛选</div>
            <div class="user-info">欢迎，{{ session.user.username }}</div>
        </header>

        <div class="card">
            <div class="card-header">
                <h3>筛选条件</h3>
                <span class="card-desc">支持模糊查询、排序、时间范围</span>
            </div>
            <div class="card-body">
                <div class="filter-form">
                    <div class="input-group">
                        <label>关键词搜索</label>
                        <input type="text" id="filterKeyword" placeholder="输入关键词进行模糊查询...">
                    </div>
                    <div class="input-group">
                        <label>地区</label>
                        <select id="filterRegion">
                            {% for r in regions %}
                            <option value="{{ r.id }}">{{ r.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="input-group">
                        <label>行业</label>
                        <select id="filterIndustry">
                            <option value="">全部行业</option>
                            {% for i in industries %}
                            <option value="{{ i.id }}">{{ i.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="input-group">
                        <label>开始日期</label>
                        <input type="date" id="filterStartDate">
                    </div>
                    <div class="input-group">
                        <label>结束日期</label>
                        <input type="date" id="filterEndDate">
                    </div>
                    <div class="input-group">
                        <label>排序方式</label>
                        <select id="filterSort">
                            <option value="date">按日期</option>
                            <option value="budget">按金额</option>
                        </select>
                    </div>
                    <button class="btn-primary" onclick="loadData()">查询</button>
                    <button class="btn-secondary" onclick="resetFilter()">重置</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3>招标信息列表</h3>
                <span class="card-desc" id="listSummary">共 0 条数据</span>
            </div>
            <div class="card-body">
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>标题</th>
                                <th>地区</th>
                                <th>行业</th>
                                <th>发布日期</th>
                                <th>预算(万元)</th>
                                <th>来源</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="listTableBody">
                            <tr><td colspan="8" class="empty-cell">正在加载数据...</td></tr>
                        </tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination"></div>
            </div>
        </div>
    </main>
</div>
<script src="/static/js/list.js"></script>
</body>
</html>
